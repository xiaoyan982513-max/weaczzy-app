<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weaczzy - TikTok Shop Management Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            color: white;
            padding: 60px 0;
        }
        .header h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header p {
            font-size: 1.3em;
            opacity: 0.9;
        }
        .content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-top: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        .feature {
            padding: 30px;
            background: #f8f9fa;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s;
        }
        .feature:hover {
            transform: translateY(-5px);
        }
        .feature h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        .footer {
            text-align: center;
            margin-top: 60px;
            color: white;
            opacity: 0.8;
        }
        .footer a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛍️ Weaczzy</h1>
            <p>专业的TikTok店铺管理工具，助力卖家数据驱动增长</p>
        </div>

        <div class="content">
            <h2 style="text-align: center; margin-bottom: 20px;">关于 Weaczzy</h2>
            <p style="text-align: center; color: #666; max-width: 800px; margin: 0 auto;">
                Weaczzy是一款专为TikTok Shop卖家设计的综合管理工具。我们提供数据分析、
                产品优化、自动化运营等功能，帮助卖家提升店铺业绩，实现业务增长。
            </p>

            <div class="features">
                <div class="feature">
                    <h3>📊 数据分析</h3>
                    <p>实时监控店铺数据，深度分析销售趋势和用户行为</p>
                </div>
                <div class="feature">
                    <h3>🎯 产品优化</h3>
                    <p>AI驱动的商品优化建议，提升转化率和曝光量</p>
                </div>
                <div class="feature">
                    <h3>🤖 自动化运营</h3>
                    <p>定时任务和智能提醒，让店铺运营更高效</p>
                </div>
                <div class="feature">
                    <h3>📱 达人管理</h3>
                    <p>联盟达人筛选和合作管理，扩大销售渠道</p>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>&copy; 2026 Weaczzy. All rights reserved.</p>
            <p style="margin-top: 15px;">
                <a href="terms.html">服务条款</a>
                <a href="privacy.html">隐私政策</a>
            </p>
        </div>
    </div>
</body>
</html>
